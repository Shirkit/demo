name: Research Experiment
on:
  workflow_dispatch: # Manual "Run" button

env:
  REQUEST_CPU: 3      # Examples: 3 (Small), 10, or ALL for the whole machine
  REQUEST_MEM: 16G    # Examples: 8G, 32G, 60G
  REQUEST_GPU: 1      # Use 1 for the T1000 (8GB), Use 0 for CPU-only
# ---------------------------------

jobs:
  build-and-queue:
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: |
          # Convert repository name to lowercase to satisfy Docker rules
          REPO_NAME=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
          docker build -t "lab-image-$REPO_NAME" .
          
          # Export for the next step within the same run block
          echo "IMAGE_NAME=lab-image-$REPO_NAME" >> $GITHUB_ENV

      - name: Submit to Slurm Queue
        run: |
          # 1. Logic for CPU "ALL" vs Number
          if [ "$REQUEST_CPU" == "ALL" ]; then
            CPU_FLAG="--exclusive"
          else
            CPU_FLAG="--cpus-per-task=$REQUEST_CPU"
          fi

          # 2. Logic for the GPU flag
          if [ "$REQUEST_GPU" -eq 1 ]; then
            GRES_FLAG="--gres=gpu:1"
          else
            GRES_FLAG=""
          fi

          # 3. Submit to sbatch
          # We use the IMAGE_NAME we saved in the previous step
          sbatch --job-name="${{ github.event.repository.name }}" \
                 $CPU_FLAG \
                 --mem="$REQUEST_MEM" \
                 $GRES_FLAG \
                 /home/wiser/scripts/run_experiment.sh \
                 "$IMAGE_NAME" \
                 "${{ github.actor }}"
