# ==============================================================================
# SECTION 1: GLOBAL IDENTIFICATION
# ==============================================================================
[global_tags]
  student = "YOUR_NAME_HERE"  # Replace with your name (e.g., "peu")

# ==============================================================================
# SECTION 2: INPUTS (Pick the one that matches your data)
# ==============================================================================

# --- OPTION A: SIMPLE JSON ---
# Use this if you send: {"temp": 25.5, "hum": 60}
# [[inputs.mqtt_consumer]]
#   servers = ["tcp://mosquitto:1883"]
#   topics = ["research/YOUR_NAME_HERE/simple"]
#   data_format = "json"
#   name_override = "simple_metrics"


# --- OPTION B: NESTED JSON (Complex Objects) ---
# Use this if you send: {"data": {"average_temperature": 30.0, "std_dev": 0.5}}
# [[inputs.mqtt_consumer]]
#   servers = ["tcp://mosquitto:1883"]
#   topics = ["research/YOUR_NAME_HERE/nested"]
#   data_format = "json_v2"
#   [[inputs.mqtt_consumer.json_v2]]
#     measurement_name = "weather_complex"
#     [[inputs.mqtt_consumer.json_v2.field]]
#       path = "data.average_temperature"
#       rename = "temp"
#       type = "float"
#     [[inputs.mqtt_consumer.json_v2.field]]
#       path = "data.std_dev"
#       type = "float"


# --- OPTION C: CSV (Weather Data) ---
# Header: timestamp,average_temperature,average_humidity,temp_std_dev,humidity_std_dev...
[[inputs.mqtt_consumer]]
  servers = ["tcp://mosquitto:1883"]
  topics = ["research/YOUR_NAME_HERE/weather_csv"]
  data_format = "csv"
  csv_header_row_count = 1
  csv_timestamp_column = "timestamp"
  csv_timestamp_format = "unix"
  csv_column_names = ["timestamp", "average_temperature", "average_humidity", "temp_std_dev", "humidity_std_dev", "temp_lower", "temp_upper", "hum_lower", "hum_upper"]
  csv_column_types = ["int", "float", "float", "float", "float", "float", "float", "float", "float"]
  name_override = "weather_csv_data"


# --- OPTION D: CSV (Gas/Light/Loudness Sensors) ---
# Header: timestamp,average_value,std_dev,conf_interval_lower,conf_interval_upper
# [[inputs.mqtt_consumer]]
#   servers = ["tcp://mosquitto:1883"]
#   topics = ["research/YOUR_NAME_HERE/sensor_csv"]
#   data_format = "csv"
#   csv_header_row_count = 1
#   csv_timestamp_column = "timestamp"
#   csv_timestamp_format = "unix"
#   csv_column_names = ["timestamp", "average_value", "std_dev", "lower", "upper"]
#   csv_column_types = ["int", "float", "float", "float", "float"]
#   name_override = "ambient_csv_data"


# ==============================================================================
# SECTION 3: OUTPUT (Where the data goes)
# ==============================================================================
[[outputs.influxdb]]
  urls = ["http://influxdb:8086"]
  
  # This creates a private database for the student automatically
  database = "db_YOUR_NAME_HERE"
  
  # Reliability settings
  timeout = "5s"
  retention_policy = ""
  write_consistency = "any"
  skip_database_creation = false

  # If authentication is needed, uncomment these:
  # username = "YOUR_NAME_HERE"
  # password = "YOUR_PASSWORD_HERE"
